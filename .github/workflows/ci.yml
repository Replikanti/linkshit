name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate JSON files
        run: npm run validate

      - name: Syntax check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Pack extension
        run: npm run pack

      - uses: actions/upload-artifact@v4
        with:
          name: linkshit-extension
          path: web-ext-artifacts/*.zip
          if-no-files-found: error
          retention-days: 14
